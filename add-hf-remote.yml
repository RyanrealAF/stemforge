name: Add HF Remote and Push

on:
  workflow_dispatch:

jobs:
  push-to-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add huggingface https://Ryanrealaf:$HF_TOKEN@huggingface.co/spaces/Ryanrealaf/stemforge.git
          git push huggingface main --force
